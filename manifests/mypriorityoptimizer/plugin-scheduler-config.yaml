apiVersion: kubescheduler.config.k8s.io/v1
kind: KubeSchedulerConfiguration
profiles:
- schedulerName: default-scheduler
  plugins:
    preEnqueue:
      enabled:
        - name: MyPriorityOptimizer
    preFilter:
      enabled:
        - name: MyPriorityOptimizer
    postFilter:
      enabled:
        - name: MyPriorityOptimizer # TODO: should only be enabled if using PerPod@PostFilter strategy 
    reserve:
      enabled:
        - name: MyPriorityOptimizer