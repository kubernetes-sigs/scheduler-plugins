---
# Test scenario to demonstrate default scheduler limitations with cross-node bin-packing
# This creates the exact scenario described:
# - Node A (worker) pods: a1 (10 CPU) + a2 (9 CPU) = 19/24 CPUs
# - Node B (worker2) pods: b1 (2 CPU) + b2 (8 CPU) = 10/24 CPUs
# - Node C (worker3): c1(2 CPU) + c2(15 CPU) = 17/24 CPUs used
# - High-priority pod needs 24 CPUs
#
# Optimal solution: move b1 to to Node A; move c1 to Node A; move b2 to Node C; schedule new pod on Node B
# Default scheduler will likely evict all pods from one node instead

apiVersion: v1
kind: Namespace
metadata:
  name: binpacking-test
---
# Priority classes for the test
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: low-priority
value: 100
globalDefault: false
description: "Low priority class for victim pods"
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: high-priority
value: 1000
globalDefault: false
description: "High priority class that should trigger preemption"
---
# Node A (worker) pods: a1 (10 CPU) + a2 (9 CPU) = 19/24 CPUs
apiVersion: v1
kind: Pod
metadata:
  name: pod-a1
  namespace: binpacking-test
  labels:
    node-group: "node-a"
    pod-type: "victim"
spec:
  priorityClassName: low-priority
  schedulerName: default-scheduler
  nodeSelector:
    kubernetes.io/hostname: mycluster-worker
  containers:
  - name: cpu-consumer
    image: busybox:1.35
    command: 
    - /bin/sh
    - -c
    - |
      echo "Pod a1 starting on node $(hostname)"
      while true; do
        echo "Pod a1 consuming 10 CPUs on $(hostname)"
        sleep 30
      done
    resources:
      requests:
        cpu: 10000m
        memory: 100Mi
      limits:
        cpu: 10000m
        memory: 100Mi
  restartPolicy: Never
---
apiVersion: v1
kind: Pod
metadata:
  name: pod-a2
  namespace: binpacking-test
  labels:
    node-group: "node-a"
    pod-type: "victim"
spec:
  priorityClassName: low-priority
  schedulerName: default-scheduler
  nodeSelector:
    kubernetes.io/hostname: mycluster-worker
  containers:
  - name: cpu-consumer
    image: busybox:1.35
    command: 
    - /bin/sh
    - -c
    - |
      echo "Pod a2 starting on node $(hostname)"
      while true; do
        echo "Pod a2 consuming 9 CPUs on $(hostname)"
        sleep 30
      done
    resources:
      requests:
        cpu: 9000m
        memory: 100Mi
      limits:
        cpu: 9000m
        memory: 100Mi
  restartPolicy: Never
---
# Node B (worker2) pods: b1 (2 CPU) + b2 (8 CPU) = 10/24 CPUs
apiVersion: v1
kind: Pod
metadata:
  name: pod-b1
  namespace: binpacking-test
  labels:
    node-group: "node-b"
    pod-type: "victim"
spec:
  priorityClassName: low-priority
  schedulerName: default-scheduler
