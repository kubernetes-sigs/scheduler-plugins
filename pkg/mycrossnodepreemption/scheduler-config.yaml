apiVersion: kubescheduler.config.k8s.io/v1
kind: KubeSchedulerConfiguration
profiles:
- schedulerName: mycrossnodepreemption-scheduler
  plugins:
    # Enable our custom cross-node preemption plugin
    postFilter:
      enabled:
      - name: MyCrossNodePreemption
      # Disable default preemption to avoid conflicts
      disabled:
      - name: DefaultPreemption
    # Keep other default plugins
    preFilter:
      enabled:
      - name: NodeResourcesFit
      - name: NodeAffinity
      - name: PodTopologySpread
    filter:
      enabled:
      - name: NodeResourcesFit
      - name: NodeAffinity
      - name: PodTopologySpread
      - name: TaintToleration
    score:
      enabled:
      - name: NodeResourcesFit
      - name: NodeAffinity
      - name: PodTopologySpread
  # Plugin configuration
  pluginConfig:
  - name: MyCrossNodePreemption
    args:
      maxCandidates: 50
      enableBranchCutting: true
      considerPDBs: true
      scoreWeights:
        priority: 0.4
        resources: 0.3
        topology: 0.3
      timeoutDuration: "3s"
