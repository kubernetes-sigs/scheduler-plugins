name: Releases
on:
  push:
    tags:
    - v*

jobs:
  releases:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: github.event_name != 'pull_request'
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    - uses: azure/setup-helm@5119fcb9089d432beecbf79bb2c7915207344b78 # v3
      with:
         version: 'latest'
         token: ${{ secrets.GITHUB_TOKEN }}
      id: install
    - name: Package Helm Chart
      if: ${{ github.repository == 'kubernetes-sigs/scheduler-plugins' }}
      run: |
        helm package ./manifests/install/charts/as-a-second-scheduler
    - name: Upload to Release
      if: startsWith(github.ref, 'refs/tags/')
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create ${{ github.ref_name }} --generate-notes || true
        gh release upload ${{ github.ref_name }} *.tgz --clobber
