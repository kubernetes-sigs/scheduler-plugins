name: SonarQube Scan

on:
  push:
    branches:
    - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest

    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Create Truststore
      env:
        TRUSTSTORE: ${{ secrets.SONAR_TRUSTSTORE_BASE64 }}
      run: |
        mkdir -p ${{ github.workspace }}/certs
        echo "${TRUSTSTORE}" | base64 -d > ${{ github.workspace }}/certs/castorevpcprod

    - name: Simple Truststore Verification
      run: |
        echo "File exists: $(test -f ${{ github.workspace }}/certs/castorevpcprod && echo 'YES' || echo 'NO')"
        echo "File size: $(stat -c%s ${{ github.workspace }}/certs/castorevpcprod 2>/dev/null || stat -f%z ${{ github.workspace }}/certs/castorevpcprod)"
        echo "File type: $(file ${{ github.workspace }}/certs/castorevpcprod)"

    - name: SonarQube Scan (Branch)
      if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
      uses: sonarsource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8.0.0
      with:
        args: |
          -Dsonar.projectKey=${{ secrets.ORGID }}-${{ github.repository_id }}
          -Dsonar.projectName="${{ github.repository }}"
          -Dsonar.sources=.
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
          -Dsonar.branch.name=${{ github.ref_name }}
          -Dsonar.scanner.truststorePath=${{ github.workspace }}/certs/castorevpcprod
          -Dsonar.scanner.truststorePassword=${{ secrets.SONAR_CERTS_PASSWORD }}

    - name: SonarQube Scan (Pull Request)
      if: github.event_name == 'pull_request'
      uses: sonarsource/sonarqube-scan-action@59db25f34e16620e48ab4bb9e4a5dce155cb5432 # v8.0.0
      with:
        args: |
          -Dsonar.projectKey=${{ secrets.ORGID }}-${{ github.repository_id }}
          -Dsonar.projectName="${{ github.repository }}"
          -Dsonar.sources=.
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }}
          -Dsonar.pullrequest.key=${{ github.event.pull_request.number }}
          -Dsonar.pullrequest.branch=${{ github.head_ref }}
          -Dsonar.pullrequest.base=${{ github.base_ref }}
          -Dsonar.scanner.truststorePath=${{ github.workspace }}/certs/castorevpcprod
          -Dsonar.scanner.truststorePassword=${{ secrets.SONAR_CERTS_PASSWORD }}
