name: CI (Build + Unit + Integration)

on:
  push:
    branches: [ "opt-prio-main" ]
  pull_request:
    branches: [ "opt-prio-main" ]

jobs:
  # -------------------------------------------------------
  # Unit tests (Python + Go)
  # -------------------------------------------------------
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - id: load-env
        name: Load envs from file
        shell: bash
        run: |
          set -euo pipefail
          source opt-prio.env

          # Fail-fast checks
          : "${PYTHON_VERSION:?PYTHON_VERSION missing in env file}"
          : "${GO_VERSION:?GO_VERSION missing in env file}"

          # Expose as step outputs to avoid "context access might be invalid"
          {
            echo "PYTHON_VERSION=${PYTHON_VERSION}"
            echo "GO_VERSION=${GO_VERSION}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.load-env.outputs.PYTHON_VERSION }}

      - name: Install Python test deps
        run: |
          python -m pip install --upgrade pip
          if [ -f scripts/test/requirements.txt ]; then
            pip install -r scripts/test/requirements.txt
          fi

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.load-env.outputs.GO_VERSION }}

      - name: Prepare coverage directories
        run: |
          mkdir -p coverage/unit/python
          mkdir -p coverage/unit/go

      - name: Run python unit tests
        run: |
          python -m pytest scripts/test \
            --cov=scripts \
            --cov-report=xml:coverage/unit/python/coverage.xml \
            --cov-report=html:coverage/unit/python/html

      - name: Run go unit tests
        run: |
          go test ./pkg/mypriorityoptimizer \
            -coverprofile=coverage/unit/go/go_coverage.out
          go tool cover \
            -func=coverage/unit/go/go_coverage.out
          go tool cover \
            -html=coverage/unit/go/go_coverage.out \
            -o coverage/unit/go/coverage.html

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports-unit
          path: |
            coverage/unit/python
            coverage/unit/go
      
  # -------------------------------------------------------
  # Integration tests
  # -------------------------------------------------------
  integration-tests:
    needs: ["unit-tests"]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - id: load-env
        name: Load envs from file
        shell: bash
        run: |
          set -euo pipefail
          source opt-prio.env
          : "${GO_VERSION:?GO_VERSION missing in env file}"
          : "${SCHEDULER_VERSION:?SCHEDULER_VERSION missing in env file}"
          : "${PYTHON_VERSION:?PYTHON_VERSION missing in env file}"
          : "${KUBE_SCHEDULER_BIN:?KUBE_SCHEDULER_BIN missing in env file}"
          : "${VENV_DIR:?VENV_DIR missing in env file}"
          : "${SOLVER_DIR:?SOLVER_DIR missing in env file}"
          : "${KUBECTL_VERSION:?KUBECTL_VERSION missing in env file}"
          : "${KWOK_VERSION:?KWOK_VERSION missing in env file}"
          {
            echo "GO_VERSION=${GO_VERSION}"
            echo "SCHEDULER_VERSION=${SCHEDULER_VERSION}"
            echo "PYTHON_VERSION=${PYTHON_VERSION}"
            echo "KUBE_SCHEDULER_BIN=${KUBE_SCHEDULER_BIN}"
            echo "VENV_DIR=${VENV_DIR}"
            echo "SOLVER_DIR=${SOLVER_DIR}"
            echo "KUBECTL_VERSION=${KUBECTL_VERSION}"
            echo "KWOK_VERSION=${KWOK_VERSION}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.load-env.outputs.GO_VERSION }}

      - name: Build kube-scheduler binary
        run: |
          make build-scheduler VERSION=${{ steps.load-env.outputs.SCHEDULER_VERSION }}

      - name: Make binary executable
        run: chmod +x "${{ steps.load-env.outputs.KUBE_SCHEDULER_BIN }}"

      - name: Install kubectl / kwokctl / kwok
        env:
          KUBECTL_VERSION: ${{ steps.load-env.outputs.KUBECTL_VERSION }}
          KWOK_VERSION: ${{ steps.load-env.outputs.KWOK_VERSION }}
        run: |
          set -euo pipefail
          echo "Installing kubectl ${KUBECTL_VERSION} and kwok ${KWOK_VERSION}"
          cd /tmp

          curl -fsSLo kubectl "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo install -m 0755 kubectl /usr/local/bin/kubectl

          curl -fsSLo kwokctl-linux-amd64 "https://github.com/kubernetes-sigs/kwok/releases/download/${KWOK_VERSION}/kwokctl-linux-amd64"
          curl -fsSLo kwok-linux-amd64   "https://github.com/kubernetes-sigs/kwok/releases/download/${KWOK_VERSION}/kwok-linux-amd64"
          chmod +x kwokctl-linux-amd64 kwok-linux-amd64
          sudo install -m 0755 kwokctl-linux-amd64 /usr/local/bin/kwokctl
          sudo install -m 0755 kwok-linux-amd64   /usr/local/bin/kwok

          rm -f kubectl kwokctl-linux-amd64 kwok-linux-amd64

          echo "kubectl:" && kubectl version --client || true
          echo "kwokctl:" && kwokctl --version || true
          echo "kwok:" && kwok --version || true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.load-env.outputs.PYTHON_VERSION }}

      - name: Set up solver Python environment
        run: |
          set -euo pipefail
          sudo install -d -m 0755 "${{ steps.load-env.outputs.SOLVER_DIR }}" "${{ steps.load-env.outputs.VENV_DIR }}"
          sudo chown -R "$USER:$USER" "${{ steps.load-env.outputs.SOLVER_DIR }}" "${{ steps.load-env.outputs.VENV_DIR }}"
          cp scripts/python_solver/main.py "${{ steps.load-env.outputs.SOLVER_DIR }}/main.py"
          python -m venv "${{ steps.load-env.outputs.VENV_DIR }}"
          "${{ steps.load-env.outputs.VENV_DIR }}/bin/python" -m pip install --upgrade pip
          "${{ steps.load-env.outputs.VENV_DIR }}/bin/pip" install --no-cache-dir -r scripts/python_solver/requirements.txt

      - name: Prepare integration test coverage directory
        run: mkdir -p coverage/integration/kwok

      - name: Install integration test deps
        run: |
          python -m pip install --upgrade pip
          if [ -f scripts/kwok_integration_tests/requirements.txt ]; then
            pip install -r scripts/kwok_integration_tests/requirements.txt
          fi

      - name: Run integration tests
        run: |
          python -m pytest -s \
            scripts/kwok_integration_tests/test_modes.py \
            --cov=scripts/kwok_integration_tests \
            --cov-report=xml:coverage/integration/kwok/coverage.xml \
            --cov-report=html:coverage/integration/kwok/html

      - name: Upload integration test coverage reports
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports-integration
          path: coverage/integration/kwok