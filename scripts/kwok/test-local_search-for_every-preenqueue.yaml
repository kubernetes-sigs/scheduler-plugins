kind: KwokctlConfiguration
apiVersion: config.kwok.x-k8s.io/v1alpha1
options:
  kubeSchedulerImage: localhost:5000/scheduler-plugins/kube-scheduler:dev
  kubeSchedulerConfig: manifests/mycrossnodepreemption/sched-cc.yaml
componentsPatches:
  - name: kube-scheduler
    extraEnvs:
      - name: OPTIMIZE_CADENCE
        value: "for_every" # choices: for_every, in_batches, continuously
      - name: OPTIMIZE_AT
        value: "preenqueue" # choices: preenqueue, postfilter
      - name: OPTIMIZATION_INTERVAL
        value: "15s"
      - name: OPTIMIZATION_INITIAL_DELAY
        value: "20s"
      - name: SOLVER_LOCAL_SEARCH_ENABLED
        value: "true"
      - name: SOLVER_LOCAL_SEARCH_TIMEOUT
        value: "200ms"
      - name: SOLVER_LOCAL_SEARCH_MAX_VICTIMS_PER_NODE
        value: "8" # -1 (unlimited)
      - name: SOLVER_LOCAL_SEARCH_MAX_RESTARTS_PER_TARGET
        value: "30" # -1 (unlimited)
      - name: SOLVER_LOCAL_SEARCH_MAX_VICTIM_PROBES_PER_TARGET
        value: "50" # -1 (unlimited)
      - name: SOLVER_LOCAL_SEARCH_MAX_MOVES_PER_PLAN
        value: "5" # -1 (unlimited)
      - name: PLAN_EXECUTION_TIMEOUT
        value: "600h" # 50s # TODO: set high to determine any potential issues