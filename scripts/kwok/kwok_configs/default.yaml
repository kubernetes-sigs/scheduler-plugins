kind: KwokRunConfiguration
namespace: test
num_nodes: 4
pods_per_node: 8
num_replicaset: 4,8 # should be at least the number of priorities
num_priorities: 4
node_cpu: 2400m
node_mem: 32Gi
# A good range for CPU and Mem interval can be found by finding the total CPU/Mem request for the utilization specified.
# Example: node_cpu=2400m, num_nodes=4, util=0.9 => total_cpu=2400*4*0.9=8640m
# Then divide it by total pods (e.g., 32) to get an average per pod (e.g., 270m) and set a range around it (e.g., 270m-150m=120 to 270m+150m=420m).
cpu_interval_per_pod: 120m,420m
mem_interval_per_pod: 2Gi,5.2Gi
#rs_replicas_per_set_interval:
util: 0.9
util_tolerance: 0.01
wait_mode: running      # one of: exist | ready | running | none
wait_timeout: 5s       # e.g., 500ms, 10s, 2m, 1h
settle_timeout: 3s      # same duration format
---
apiVersion: config.kwok.x-k8s.io/v1alpha1
kind: KwokctlConfiguration