kind: KwokRunConfiguration
namespace: test
num_nodes: 4
pods_per_node: 4
num_replicaset: 0
num_priorities: 4
node_cpu: 2400m
node_mem: 32Gi
cpu_interval_lo: 100m
cpu_interval_hi: 200m
mem_interval_lo: 256Mi
mem_interval_hi: 512Mi
util: 0.9
util-tolerance: 0.01
wait_mode: running      # one of: exist | ready | running | none
wait_timeout: 10s       # e.g., 500ms, 10s, 2m, 1h
settle_timeout: 3s      # same duration format
---
apiVersion: config.kwok.x-k8s.io/v1alpha1
kind: KwokctlConfiguration