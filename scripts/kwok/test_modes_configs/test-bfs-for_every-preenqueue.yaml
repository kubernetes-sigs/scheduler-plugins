kind: KwokRunConfiguration
namespace: test
num_nodes: 4
pods_per_node: 4
num_replicaset_lo: 0
num_replicaset_hi: 0
num_priorities: 4
node_cpu: 2400m
node_mem: 32Gi
cpu_interval_lo: 100m
cpu_interval_hi: 200m
mem_interval_lo: 256Mi
mem_interval_hi: 512Mi
util: 0.9
util-tolerance: 0.01
wait_mode: running      # one of: exist | ready | running | none
wait_timeout: 5s       # e.g., 500ms, 10s, 2m, 1h
settle_timeout: 3s      # same duration format
---
kind: KwokctlConfiguration
apiVersion: config.kwok.x-k8s.io/v1alpha1
options:
  kubeSchedulerImage: localhost:5000/scheduler-plugins/kube-scheduler:dev
  kubeSchedulerConfig: manifests/mycrossnodepreemption/sched-cc.yaml
componentsPatches:
  - name: kube-scheduler
    extraEnvs:
      - name: OPTIMIZE_CADENCE
        value: "for_every" # choices: for_every, in_batches, continuously
      - name: OPTIMIZE_AT
        value: "preenqueue" # choices: preenqueue, postfilter
      - name: OPTIMIZATION_INTERVAL
        value: "15s"
      - name: OPTIMIZATION_INITIAL_DELAY
        value: "20s"
      - name: PLAN_EXECUTION_TIMEOUT
        value: "600h" # 50s # TODO: set high to determine any potential issues
      - name: SOLVER_BFS_ENABLED
        value: "true"
      - name: SOLVER_BFS_TIMEOUT
        value: "200ms"
      - name: SOLVER_BFS_MAX_DEPTH
        value: "5"
      - name: SOLVER_BFS_MAX_VICTIMS_PER_NODE
        value: "-1" # -1 (unlimited)
      - name: SOLVER_BFS_MAX_DESTS_PER_LEVEL
        value: "-1" # -1 (unlimited)
      - name: SOLVER_BFS_MAX_SUCCESSORS_PER_STATE
        value: "-1" # -1 (unlimited)
      - name: SOLVER_BFS_MAX_FRONTIER_PER_DEPTH
        value: "-1" # -1 (unlimited)