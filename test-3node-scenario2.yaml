---
# Test scenario to demonstrate default scheduler limitations with cross-node bin-packing
# This creates the exact scenario described:
# - Node A (worker) pods: a1 (7 CPU) + a2 (3 CPU) = 10/24 CPUs
# - Node B (worker2) pods: b1 (8 CPU) + b2 (8 CPU) + b3 (6 CPU) = 22/24 CPUs
# - Node C (worker3): c1 (5 CPU) + c2 (5 CPU) + c3 (4 CPU) = 14/24 CPUs used
# - High-priority pod needs 23 CPUs
#
# Optimal solution: requires 4 moves
# Default scheduler will likely evict all pods from one node instead

apiVersion: v1
kind: Namespace
metadata:
  name: binpacking-test
---
# Priority classes for the test
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: low-priority
value: 100
globalDefault: false
description: "Low priority class for victim pods"
---
apiVersion: scheduling.k8s.io/v1
kind: PriorityClass
metadata:
  name: high-priority
value: 1000
globalDefault: false
description: "High priority class that should trigger preemption"
---
# Node A (worker) pods: a1 (7 CPU) + a2 (3 CPU) = 10/24 CPUs
apiVersion: v1
kind: Pod
metadata:
  name: pod-a1
  namespace: binpacking-test
  labels:
    node-group: "node-a"
    pod-type: "victim"
spec:
  priorityClassName: low-priority
  schedulerName: default-scheduler
  nodeSelector:
    kubernetes.io/hostname: mycluster-worker
  containers:
  - name: cpu-consumer
    image: busybox:1.35
    command: 
    - /bin/sh
    - -c
    - |
      echo "Pod a1 starting on node $(hostname)"
      while true; do
        echo "Pod a1 consuming 7 CPUs on $(hostname)"
        sleep 30
      done
    resources:
      requests:
        cpu: 7000m
        memory: 100Mi
      limits:
        cpu: 7000m
        memory: 100Mi
  restartPolicy: Never
---
apiVersion: v1
kind: Pod
