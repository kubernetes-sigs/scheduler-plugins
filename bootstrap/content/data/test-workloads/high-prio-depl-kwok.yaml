apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-deploy
  namespace: test
spec:
  replicas: 3
  selector:
    matchLabels:
      app: demo-deploy
  template:
    metadata:
      labels:
        app: demo-deploy
    spec:
      priorityClassName: p4
      tolerations:
        - key: "kwok.x-k8s.io/node"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
      - name: c
        image: registry.k8s.io/pause:3.9
        resources:
          requests:
            cpu: 6000m
            memory: 64Mi
          limits:
            cpu: 6000m
            memory: 64Mi
