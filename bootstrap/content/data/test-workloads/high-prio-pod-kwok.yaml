apiVersion: v1
kind: Pod
metadata:
  name: high-priority-pod2
  namespace: test
spec:
  priorityClassName: p4
  tolerations:
    - key: "kwok.x-k8s.io/node"
      operator: "Exists"
      effect: "NoSchedule"
  containers:
  - name: c
    image: registry.k8s.io/pause:3.9
    resources:
      requests:
        cpu: "1000m"
        memory: "1Gi"
      limits:
        cpu: "1000m"
        memory: "1Gi"
