kind: KwokRunConfiguration
namespace: test
num_nodes: 4
pods_per_node: 4
num_priorities: [3,5] # Can both be an interval or a fixed number
node_cpu: 2400m
node_mem: 32Gi

# A good range for CPU and Mem interval can be found by finding the total CPU/Mem request for the utilization specified.
# Example: 
# node_cpu=2400m, num_nodes=4, util=0.9 => total_cpu=2400*4*0.9=8640m
# node_mem=32Gi, num_nodes=4, util=0.9 => total_mem=32*4*0.9=115.2Gi
# Then divide it by total pods (e.g., 32) to get an average per pod (e.g., 270m for cpu) and set a range around it (e.g., 270m-150m=120 to 270m+150m=420m).
cpu_per_pod: [340m,740m]
mem_per_pod: [5.2Gi,9.2Gi]

#num_replicaset: [4,8] # OPTIONAL: if set the lower bound should be at least the number of priorities. Can both be an interval or a fixed number.
#num_replicas_per_rs_set: [2,8] # Needed if num_replicaset is set, high should be <= total_pods/num_replicaset. Can both be an interval or a fixed number.

util: 0.95
util_tolerance: 0.01

wait_mode: running      # one of: exist | ready | running | none
wait_timeout: 5s       # e.g., 500ms, 10s, 2m, 1h
settle_timeout: 3s      # same duration format

---
apiVersion: config.kwok.x-k8s.io/v1alpha1
kind: KwokctlConfiguration
options:
  kubeSchedulerConfig: manifests/mycrossnodepreemption/scheduler-config.yaml
  # We decide runtime (binary vs. docker) via --runtime command line flag when creating the cluster.
  kubeSchedulerBinary: bin/kube-scheduler
  kubeSchedulerImage: localhost:5000/scheduler-plugins/kube-scheduler:dev
componentsPatches:
  - name: kube-scheduler
    extraEnvs:
      - name: OPTIMIZE_CADENCE
        value: "for_every" # choices: for_every, in_batches, continuously
      - name: OPTIMIZE_AT
        value: "preenqueue" # choices: preenqueue, postfilter
      - name: OPTIMIZATION_INTERVAL
        value: "30s"
      - name: OPTIMIZATION_INITIAL_DELAY
        value: "15s"
      - name: PLAN_EXECUTION_TIMEOUT
        value: "600h" # 50s # TODO: set high to determine any potential issues
      - name: SOLVER_USE_HINTS
        value: "true"
      - name: SOLVER_PYTHON_ENABLED
        value: "true"
      - name: SOLVER_PYTHON_TIMEOUT
        value: "10s"
      - name: SOLVER_BFS_ENABLED
        value: "true"
      - name: SOLVER_BFS_TIMEOUT
        value: "200ms" # 25s
      - name: SOLVER_LOCAL_SEARCH_ENABLED
        value: "true"
      - name: SOLVER_LOCAL_SEARCH_TIMEOUT
        value: "200ms" # 25s