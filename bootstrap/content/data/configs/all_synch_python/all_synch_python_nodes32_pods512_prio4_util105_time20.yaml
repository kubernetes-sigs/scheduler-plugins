kind: KwokRunConfiguration
namespace: test
num_nodes: 32 # 4, 8, 16
# test for pods_per_node: 4, 8
# num_pods = num_nodes * pods_per_node
# 4 nodes: 16, 32 pods
# 8 nodes: 32, 64 pods
# 16 nodes: 64, 128 pods
num_pods: 512
num_priorities: 4 # either a single integer or a range [lo, hi]
cpu_per_pod: ["100m", "1000m"]   # e.g. 100m, 1 (1000m = 1 core)
mem_per_pod: ["100MB","1000MB"] # e.g. 128Mi (=128*1024*1024 bytes), 100MB (=100*1_000_000 bytes), 1Gi (=1*1024*1024*1024 bytes)
util: 1.05 # 0.90, 0.95, 1.0, 1.05, 1.10
num_replicas_per_rs: [1, 4] # either a single integer or a range [lo, hi]
wait_pod_mode: running      # one of: exist | ready | running | none
wait_pod_timeout: 2s       # e.g., 500ms, 10s, 2m, 1h
settle_timeout_min: 3s      # same duration format
settle_timeout_max: 12s     # set a little higher than timeout of solvers
---
kind: KwokctlConfiguration
apiVersion: config.kwok.x-k8s.io/v1alpha1
options:
  kubeSchedulerConfig: manifests/mycrossnodepreemption/plugin-kube-scheduler-config.yaml
  # We decide runtime (binary vs. docker) via --runtime command line flag when creating the cluster.
  kubeSchedulerBinary: bin/kube-scheduler
  kubeSchedulerImage: localhost:5000/scheduler-plugins/kube-scheduler:dev
componentsPatches:
  - name: kube-scheduler
    extraEnvs:
      - name: OPTIMIZE_MODE
        value: "manual_all_synch" # choices: every, all_synch, all_asynch, manual_all_synch
      - name: OPTIMIZE_HOOK_STAGE
        value: "postfilter" # choices: preenqueue, postfilter (not used in all_asynch mode)
      - name: PLAN_EXECUTION_TIMEOUT
        value: "600h" # set high to determine any potential issues
      - name: SOLVER_PYTHON_ENABLED
        value: "true"
      - name: SOLVER_PYTHON_TIMEOUT
        value: "20s" # 1s, 10s, 20s