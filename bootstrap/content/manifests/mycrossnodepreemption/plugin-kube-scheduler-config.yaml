# sched-cc.yaml

apiVersion: kubescheduler.config.k8s.io/v1
kind: KubeSchedulerConfiguration
parallelism: 1
percentageOfNodesToScore: 100
profiles:
- schedulerName: default-scheduler
  percentageOfNodesToScore: 100
  plugins:
    score:
      enabled:
        - name: MyScoreBreaker
          weight: 1
    preEnqueue:
      enabled:
        - name: MyCrossNodePreemption
    preFilter:
      enabled:
        - name: MyCrossNodePreemption
    postFilter:
      enabled:
        - name: MyCrossNodePreemption
    reserve:
      enabled:
        - name: MyCrossNodePreemption
    postBind:
      enabled:
        - name: MyCrossNodePreemption
    multiPoint:
      disabled:
        - name: DefaultPreemption