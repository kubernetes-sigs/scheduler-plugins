# sched-cc.yaml

apiVersion: kubescheduler.config.k8s.io/v1
kind: KubeSchedulerConfiguration
parallelism: 1
percentageOfNodesToScore: 100
profiles:
- schedulerName: default-scheduler
  percentageOfNodesToScore: 100
  pluginConfig:
    - name: PodTopologySpread
      args:
        defaultConstraints: []
        defaultingType: List
  plugins:
    score:
      enabled:
        - name: MyScoreBreaker
          weight: 1
    multiPoint:
      disabled:
        - name: DefaultPreemption
        - name: PodTopologySpread