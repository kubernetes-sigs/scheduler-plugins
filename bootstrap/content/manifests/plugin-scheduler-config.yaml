apiVersion: kubescheduler.config.k8s.io/v1
kind: KubeSchedulerConfiguration
profiles:
- schedulerName: default-scheduler
  plugins:
    preEnqueue:
      enabled:
        - name: MyCrossNodePreemption
    preFilter:
      enabled:
        - name: MyCrossNodePreemption
    postFilter:
      enabled:
        - name: MyCrossNodePreemption
    reserve:
      enabled:
        - name: MyCrossNodePreemption
    postBind:
      enabled:
        - name: MyCrossNodePreemption
    multiPoint:
      disabled:
        - name: DefaultPreemption