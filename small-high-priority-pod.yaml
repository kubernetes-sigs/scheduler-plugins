apiVersion: v1
kind: Pod
metadata:
  name: small-high-priority-pod
  namespace: binpacking-test
  labels:
    pod-type: high-priority
spec:
  schedulerName: default-scheduler
  priorityClassName: high-priority
  containers:
  - name: cpu-consumer
    image: busybox:1.35
    command: ["/bin/sh", "-c"]
    args:
    - |
      echo "Small high-priority pod starting on node $(hostname)"
      while true; do
        echo "Small high-priority pod consuming 15 CPUs on $(hostname)"
        sleep 30
      done
    resources:
      requests:
        cpu: "15"
        memory: "100Mi"
      limits:
        cpu: "15"
        memory: "100Mi"
  restartPolicy: Never
