# Final Preemption Test - Complete Cross-Node Preemption Validation
apiVersion: v1
kind: Namespace
metadata:
  name: final-preemption-test
---
# Step 1: Deploy low-priority victim pods that fill up the cluster
apiVersion: apps/v1
kind: Deployment
metadata:
  name: victim-workload
  namespace: final-preemption-test
spec:
  replicas: 4  # 2 worker nodes, 2 pods per node
  selector:
    matchLabels:
      app: victim
      test: final
  template:
    metadata:
      labels:
        app: victim
        test: final
    spec:
      priorityClassName: low-priority
      containers:
      - name: resource-hog
        image: registry.k8s.io/pause:3.9
        resources:
          requests:
            cpu: "11000m"    # 11 CPU cores - will fill most of each node
            memory: "8Gi"
          limits:
            cpu: "11000m"
            memory: "8Gi"
      nodeSelector:
        kubernetes.io/os: linux
      # Spread across worker nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - victim
              topologyKey: kubernetes.io/hostname
---
# Step 2: High priority preemptor that will trigger cross-node preemption
apiVersion: v1
kind: Pod
metadata:
  name: final-preemptor
  namespace: final-preemption-test
  labels:
    app: preemptor
    test: final
spec:
  priorityClassName: high-priority
  schedulerName: default-scheduler
  containers:
  - name: preemptor-app
    image: nginx:1.20
    resources:
      requests:
        cpu: "15000m"    # 15 CPU cores - will definitely need preemption
        memory: "10Gi"
      limits:
        cpu: "15000m"
        memory: "10Gi"
    ports:
    - containerPort: 80
  nodeSelector:
    kubernetes.io/os: linux
